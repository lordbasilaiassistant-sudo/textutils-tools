    <h1>Text Diff Tool</h1>
<p class="tagline">Compare two texts and see the differences</p>
<div class="card">
  
<div class="row">
  <div>
    <label for="diff-a">Original Text</label>
    <textarea id="diff-a" rows="12" placeholder="Paste original text here..."></textarea>
  </div>
  <div>
    <label for="diff-b">Modified Text</label>
    <textarea id="diff-b" rows="12" placeholder="Paste modified text here..."></textarea>
  </div>
</div>
<div class="controls">
  <button onclick="doDiff()">Compare</button>
</div>
<div class="output-area" id="diff-output" style="white-space:pre-wrap;"></div>
<script>
function doDiff(){
  const a = document.getElementById('diff-a').value.split('\n');
  const b = document.getElementById('diff-b').value.split('\n');
  const max = Math.max(a.length, b.length);
  let html = '';
  for(let i=0;i<max;i++){
    const la = a[i] ?? '';
    const lb = b[i] ?? '';
    if(la===lb){
      html += escDiff(la)+'\n';
    } else {
      if(la) html += '<span class="diff-del">- '+escDiff(la)+'</span>\n';
      if(lb) html += '<span class="diff-add">+ '+escDiff(lb)+'</span>\n';
    }
  }
  document.getElementById('diff-output').innerHTML = html;
}
function escDiff(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
