<script>
const LOREM = [

function generateLorem() {
  const n = Math.max(1, Math.min(50, parseInt(document.getElementById('count').value) || 3));

  for (let i = 0; i < n; i++) out.push(LOREM[i % LOREM.length]);
  document.getElementById('output').textContent = out.join('\n\n');
